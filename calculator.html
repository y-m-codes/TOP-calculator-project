<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">

  </head>

  <body>
    <div id="div-title" class="visible-border">
      <h1 id="title">Calculator</h1>
    </div>

    <div id="div-calculator-outer" class="visible-border">
      <div id="div-calculator-inner" class="invisible-border">
        <div id="div-display-panel" class="visible-border">
          <p></p>
        </div>

        <div id="div-keypad" class="invisible-border">
          <div id="cluster-1" class="visible-border keypad-cluster">
            <button id="one" class="keypad visible-border button number">
              <p>1</p>
            </button>
            <button id="four" class="keypad visible-border button number">
              <p>4</p>
            </button>
             <button id="seven" class="keypad visible-border button number">
              <p>7</p>
            </button>
              <button id="zero" class="keypad visible-border button number">
              <p>0</p>
            </button>
          </div>

          <div id="cluster-2" class="visible-border keypad-cluster">
            <button id="two" class="keypad visible-border button number">
              <p>2</p>
            </button>
            <button id="five" class="keypad visible-border button number">
              <p>5</p>
            </button>
            <button id="eight" class="keypad visible-border button number">
              <p>8</p>
            </button>
            <button id="decimal" class="keypad visible-border button">
              <p>.</p>
            </button>
          </div>

          <div id="cluster-3" class="visible-border keypad-cluster">
            <button id="three" class="keypad visible-border button number">
              <p>3</p>
            </button>
            <button id="six" class="keypad visible-border button number">
              <p>6</p>
            </button>
            <button id="nine" class="keypad visible-border butto numbern">
              <p>9</p>
            </button>
            <button id="sign" class="keypad visible-border button">
              <p>+/-</p>
            </button>
          </div>

          <div id="cluster-4" class="visible-border keypad-cluster">
            <button id="add" class="keypad visible-border button operand">
              <p>+</p>
            </button>
            <button id="subtract" class="keypad visible-border button operand">
              <p>-</p>
            </button>
            <button id="divide" class="keypad visible-border button operand">
              <p>/</p>
            </button>
            <button id="multiply" class="keypad visible-border button operand">
              <p>*</p>
            </button>
          </div>

          <div id="cluster-5" class="visible-border keypad-cluster">
            <button id="backspace" class="keypad visible-border button">
              <p>⌫</p>
            </button>
            <button id="clear" class="keypad visible-border button">
              <p>C</p>
            </button>
            <button id="equals" class="keypad visible-border button">
              <p>=</p>
            </button>
          </div>






        </div>
      </div>
    </div>

    <script src="calculator.js"></script>

  </body>
</html>
